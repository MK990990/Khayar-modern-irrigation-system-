<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المرشد الزراعي - محمود خيار</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2d6a4f">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f5f0e8;
    --card: #fdfaf4;
    --green: #2d6a4f;
    --green-light: #52b788;
    --green-pale: #d8f3dc;
    --accent: #40916c;
    --text: #1b2f1e;
    --text-muted: #6b8c72;
    --border: #c8dfc9;
    --shadow: 0 4px 24px rgba(45,106,79,0.10);
    --nav-h: 70px;
    --user-bubble: #2d6a4f;
    --ai-bubble: #fdfaf4;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Tajawal', sans-serif;
    background: var(--bg);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Top bar */
  .topbar {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    flex-shrink: 0;
  }
  .ai-avatar {
    width: 42px; height: 42px;
    background: linear-gradient(135deg, var(--green), var(--green-light));
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
  }
  .ai-info { flex: 1; }
  .ai-name { font-size: 16px; font-weight: 800; color: var(--text); }
  .ai-desc { font-size: 12px; color: var(--text-muted); }
  .online-dot {
    width: 8px; height: 8px;
    background: #22c55e;
    border-radius: 50%;
    animation: pulse 2s infinite;
    margin-left: auto;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* Chat area */
  .chat-area {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    padding-bottom: 8px;
  }

  /* Welcome card */
  .welcome-card {
    background: var(--card);
    border-radius: 20px;
    padding: 20px;
    text-align: center;
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    animation: fadeInUp 0.5s ease;
  }
  .welcome-icon { font-size: 42px; margin-bottom: 10px; }
  .welcome-title { font-size: 18px; font-weight: 800; color: var(--text); margin-bottom: 6px; }
  .welcome-text { font-size: 13px; color: var(--text-muted); line-height: 1.6; }

  /* Quick questions */
  .quick-title {
    font-size: 13px;
    font-weight: 700;
    color: var(--text-muted);
    text-align: center;
    margin: 4px 0;
  }
  .quick-btns {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .quick-btn {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 16px;
    font-family: 'Tajawal', sans-serif;
    font-size: 14px;
    color: var(--text);
    cursor: pointer;
    text-align: right;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }
  .quick-btn:hover {
    background: var(--green-pale);
    border-color: var(--green-light);
    transform: translateX(-3px);
  }
  .quick-btn .arrow { color: var(--green); font-size: 12px; margin-right: auto; }

  /* Messages */
  .msg-wrap {
    display: flex;
    flex-direction: column;
    gap: 3px;
    animation: fadeInUp 0.3s ease;
  }
  .msg-wrap.user { align-items: flex-start; }
  .msg-wrap.ai { align-items: flex-end; }
  .msg-bubble {
    max-width: 85%;
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.7;
  }
  .msg-wrap.user .msg-bubble {
    background: var(--user-bubble);
    color: white;
    border-bottom-right-radius: 4px;
  }
  .msg-wrap.ai .msg-bubble {
    background: var(--ai-bubble);
    color: var(--text);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
    box-shadow: var(--shadow);
  }
  .msg-time {
    font-size: 10px;
    color: var(--text-muted);
    padding: 0 4px;
  }

  /* Typing indicator */
  .typing-indicator {
    display: none;
    align-items: center;
    gap: 5px;
    padding: 12px 16px;
    background: var(--ai-bubble);
    border: 1px solid var(--border);
    border-radius: 18px;
    border-bottom-left-radius: 4px;
    box-shadow: var(--shadow);
    width: fit-content;
    max-width: 80px;
    align-self: flex-end;
  }
  .typing-indicator.visible { display: flex; }
  .typing-dot {
    width: 8px; height: 8px;
    background: var(--green-light);
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%,80%,100% { transform: translateY(0); }
    40% { transform: translateY(-6px); }
  }

  /* Input area */
  .input-area {
    background: var(--card);
    border-top: 1px solid var(--border);
    padding: 12px 16px calc(12px + env(safe-area-inset-bottom));
    display: flex;
    gap: 10px;
    align-items: flex-end;
    flex-shrink: 0;
    margin-bottom: var(--nav-h);
  }
  .msg-input {
    flex: 1;
    padding: 12px 16px;
    border: 2px solid var(--border);
    border-radius: 16px;
    font-family: 'Tajawal', sans-serif;
    font-size: 15px;
    color: var(--text);
    background: var(--bg);
    outline: none;
    resize: none;
    max-height: 100px;
    transition: border-color 0.3s;
    line-height: 1.4;
  }
  .msg-input:focus { border-color: var(--green-light); }
  .send-btn {
    width: 46px; height: 46px;
    background: linear-gradient(135deg, var(--green), var(--accent));
    border: none;
    border-radius: 14px;
    cursor: pointer;
    font-size: 20px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s;
    box-shadow: 0 4px 12px rgba(45,106,79,0.35);
    flex-shrink: 0;
  }
  .send-btn:hover { transform: scale(1.08); }
  .send-btn:active { transform: scale(0.95); }

  /* Bottom nav */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: var(--nav-h);
    background: var(--card);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-around;
    padding: 0 20px;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
    z-index: 100;
  }
  .nav-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    background: none;
    border: none;
    cursor: pointer;
    padding: 8px 16px;
    border-radius: 14px;
    transition: background 0.2s;
    text-decoration: none;
  }
  .nav-btn:hover, .nav-btn.active { background: var(--green-pale); }
  .nav-icon { font-size: 22px; }
  .nav-lbl { font-size: 11px; font-family: 'Tajawal', sans-serif; color: var(--text-muted); font-weight: 500; }
  .nav-btn.active .nav-lbl { color: var(--green); font-weight: 700; }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <div class="ai-avatar">🤖</div>
  <div class="ai-info">
    <div class="ai-name">المرشد الزراعي</div>
    <div class="ai-desc">مساعد ذكي لمزارع النخيل</div>
  </div>
  <div class="online-dot"></div>
</div>

<!-- Chat -->
<div class="chat-area" id="chatArea">

  <div class="welcome-card">
    <div class="welcome-icon">🌴</div>
    <div class="welcome-title">أهلاً بك في المرشد الزراعي</div>
    <div class="welcome-text">اسألني أي سؤال عن زراعة النخيل والري الذكي وإدارة المزرعة، وسأجيبك بخبرة متخصصة.</div>
  </div>

  <div class="quick-title">أسئلة شائعة:</div>

  <div class="quick-btns">
    <button class="quick-btn" onclick="askQuestion('ما هي أفضل مستويات الرطوبة لنخيل البرحي؟')">
      🌡️ ما هي أفضل مستويات الرطوبة لنخيل البرحي؟
      <span class="arrow">‹</span>
    </button>
    <button class="quick-btn" onclick="askQuestion('كيف أعرف أن النخلة تحتاج ري؟')">
      💧 كيف أعرف أن النخلة تحتاج ري؟
      <span class="arrow">‹</span>
    </button>
    <button class="quick-btn" onclick="askQuestion('ما هي أعراض نقص البوتاسيوم في النخيل؟')">
      🌿 ما هي أعراض نقص البوتاسيوم في النخيل؟
      <span class="arrow">‹</span>
    </button>
    <button class="quick-btn" onclick="askQuestion('متى يكون أفضل وقت لتلقيح النخيل؟')">
      🌸 متى يكون أفضل وقت لتلقيح النخيل؟
      <span class="arrow">‹</span>
    </button>
  </div>

  <div class="typing-indicator" id="typingIndicator">
    <div class="typing-dot"></div>
    <div class="typing-dot"></div>
    <div class="typing-dot"></div>
  </div>
</div>

<!-- Input -->
<div class="input-area">
  <textarea
    class="msg-input"
    id="msgInput"
    placeholder="اسأل المرشد الزراعي..."
    rows="1"
    onkeydown="handleKey(event)"
    oninput="autoResize(this)"
  ></textarea>
  <button class="send-btn" onclick="sendMessage()">📤</button>
</div>

<!-- Bottom nav -->
<div class="bottom-nav">
  <a class="nav-btn" href="dashboard.html">
    <span class="nav-icon">🏠</span>
    <span class="nav-lbl">لوحة التحكم</span>
  </a>
  <a class="nav-btn" href="reports.html">
    <span class="nav-icon">📊</span>
    <span class="nav-lbl">التقارير</span>
  </a>
  <a class="nav-btn" href="schedule.html">
    <span class="nav-icon">📅</span>
    <span class="nav-lbl">الجدولة</span>
  </a>
  <a class="nav-btn active" href="advisor.html">
    <span class="nav-icon">🤖</span>
    <span class="nav-lbl">المرشد</span>
  </a>
</div>

<script>
const chatArea = document.getElementById('chatArea');
const typingIndicator = document.getElementById('typingIndicator');
const SYSTEM_PROMPT = `أنت المرشد الزراعي، خبير متخصص في زراعة النخيل والري الذكي لتطبيق "محمود خيار للري الحديث". 

تخصصاتك:
- زراعة وإدارة مزارع النخيل (البرحي، السكّري، المجهول، خلاص، دقلة، خضري)
- الري الذكي وأنظمة حساسات التربة
- تشخيص أمراض النخيل ونقص العناصر الغذائية
- جدولة الري والتسميد
- تقنيات LoRa وإنترنت الأشياء في الزراعة

أسلوبك: ودود، علمي، دقيق، باللغة العربية الفصحى البسيطة. أجاباتك مختصرة وعملية.
ابدأ ردودك دائماً بـ "🌴" ثم الإجابة مباشرة.`;

function getTime() {
  return new Date().toLocaleTimeString('ar', {hour:'2-digit', minute:'2-digit'});
}

function addMsg(text, role) {
  const wrap = document.createElement('div');
  wrap.className = `msg-wrap ${role}`;

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = text;

  const time = document.createElement('div');
  time.className = 'msg-time';
  time.textContent = getTime();

  wrap.appendChild(bubble);
  wrap.appendChild(time);

  chatArea.insertBefore(wrap, typingIndicator);
  chatArea.scrollTop = chatArea.scrollHeight;
}

function showTyping() {
  typingIndicator.classList.add('visible');
  chatArea.scrollTop = chatArea.scrollHeight;
}
function hideTyping() {
  typingIndicator.classList.remove('visible');
}

const history = [];

async function callAI(question) {
  history.push({ role: 'user', content: question });
  showTyping();

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: history
      })
    });
    const data = await response.json();
    const reply = data.content?.[0]?.text || 'عذراً، لم أتمكن من الإجابة الآن.';
    history.push({ role: 'assistant', content: reply });
    hideTyping();
    addMsg(reply, 'ai');
  } catch (e) {
    hideTyping();
    addMsg('❌ خطأ في الاتصال. تحقق من الإنترنت وأعد المحاولة.', 'ai');
  }
}

window.askQuestion = function(q) {
  addMsg(q, 'user');
  callAI(q);
  // Hide quick buttons after first question
  document.querySelector('.quick-btns')?.remove();
  document.querySelector('.quick-title')?.remove();
};

window.sendMessage = function() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text) return;
  input.value = '';
  input.style.height = 'auto';
  document.querySelector('.quick-btns')?.remove();
  document.querySelector('.quick-title')?.remove();
  addMsg(text, 'user');
  callAI(text);
};

window.handleKey = function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
};

window.autoResize = function(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
};
</script>
</body>
</html>
